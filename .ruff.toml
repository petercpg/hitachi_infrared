# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py314"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203", # no-blank-line-before-class (incompatible with formatter)
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter
    "RUF001", # String contains ambiguous unicode character (Chinese punctuation)
    "RUF002", # Docstring contains ambiguous unicode character (Chinese punctuation)
    "RUF003", # Comment contains ambiguous unicode character (Chinese punctuation)
    "ERA001", # Found commented-out code (causes false positives with Chinese comments containing '=')
    "PLR2004", # Magic value used in comparison
    "G004", # Logging statement uses f-string
    "ANN", # Ignore type annotation warnings for custom component simplicity
    "FBT", # Ignore boolean trap warnings (common in HA signatures)
    "PLC0415", # Ignore local imports warnings (used to avoid circular dependencies in HA)
    "E501", # Ignore line length warnings
    "PLR0915", # Ignore too many statements warning
    "ARG", # Ignore unused arguments warnings (e.g. discovery_info in HA setup_platform)
    "D", # Ignore docstring format/missing warnings to avoid style noise
    "PLR0913", # Ignore too many arguments in constructor/function definition
    "PLR0917", # Ignore too many positional arguments in constructor/function definition
    "PLR0912", # Ignore too many branches warning in climate command translation
    "BLE", # Ignore blind exception catch warnings in fallback debug handlers
    "CPY", # Ignore missing copyright notice at top of file
]


[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25
